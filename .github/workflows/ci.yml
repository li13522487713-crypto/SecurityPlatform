name: CI

on:
  push:
    branches:
      - main
      - master
      - "cursor/**"
  pull_request:
    branches:
      - main
      - master

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed
        uses: tj-actions/changed-files@v46

      - name: Run cspell for changed files only
        shell: bash
        run: |
          : > changed-spell-files.txt
          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            case "$file" in
              AGENTS.md|CLAUDE.md|README.md|等保2.0要求清单.md|docs/*|src/backend/*|src/frontend/*)
                case "$file" in
                  *.cs|*.csproj|*.props|*.json|*.md|*.txt|*.ts|*.tsx|*.js|*.vue)
                    echo "$file" >> changed-spell-files.txt
                    ;;
                esac
                ;;
            esac
          done

          if [ ! -s changed-spell-files.txt ]; then
            echo "No changed files match spell-check scope, skip."
            exit 0
          fi

          npx --yes cspell --config cspell.json --no-progress --no-summary --file-list changed-spell-files.txt

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore Atlas.SecurityPlatform.slnx

      - name: Build backend
        run: dotnet build Atlas.SecurityPlatform.slnx --configuration Release --no-restore

      - name: Run targeted backend tests
        run: dotnet test tests/Atlas.SecurityPlatform.Tests/Atlas.SecurityPlatform.Tests.csproj --configuration Release --no-build --filter FullyQualifiedName~DynamicRecordRepositoryTenantIsolationTests

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/Atlas.WebApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/Atlas.WebApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
