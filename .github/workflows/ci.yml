name: CI

on:
  push:
    branches:
      - main
      - master
      - "cursor/**"
  pull_request:
    branches:
      - main
      - master

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed
        uses: tj-actions/changed-files@v46

      - name: Run cspell for changed files only
        shell: bash
        run: |
          : > changed-spell-files.txt
          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            case "$file" in
              AGENTS.md|CLAUDE.md|README.md|等保2.0要求清单.md|docs/*|src/backend/*|src/frontend/*)
                case "$file" in
                  *.cs|*.csproj|*.props|*.json|*.md|*.txt|*.ts|*.tsx|*.js|*.vue)
                    echo "$file" >> changed-spell-files.txt
                    ;;
                esac
                ;;
            esac
          done

          if [ ! -s changed-spell-files.txt ]; then
            echo "No changed files match spell-check scope, skip."
            exit 0
          fi

          npx --yes cspell --config cspell.json --no-progress --no-summary --file-list changed-spell-files.txt

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend
        run: dotnet restore Atlas.SecurityPlatform.slnx

      - name: Dependency vulnerability gate (Critical/High)
        run: |
          dotnet list Atlas.SecurityPlatform.slnx package --vulnerable --include-transitive --format json > vulnerability-report.json
          python3 - <<'PY'
          import json
          import sys

          with open("vulnerability-report.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          blocked = []
          for project in data.get("projects", []):
              for section in ("topLevelPackages", "transitivePackages"):
                  for pkg in project.get(section, []):
                      for vuln in pkg.get("vulnerabilities", []):
                          severity = str(vuln.get("severity", "")).lower()
                          if severity in {"critical", "high"}:
                              blocked.append(
                                  (
                                      project.get("path", ""),
                                      pkg.get("id", ""),
                                      pkg.get("resolvedVersion", ""),
                                      vuln.get("severity", ""),
                                      vuln.get("advisoryurl", ""),
                                  )
                              )

          if blocked:
              print("发现 Critical/High 漏洞，阻断构建：")
              for item in blocked:
                  print(f"- project={item[0]} package={item[1]} version={item[2]} severity={item[3]} advisory={item[4]}")
              sys.exit(1)

          print("依赖漏洞扫描通过（Critical/High=0）。")
          PY

      - name: Build backend
        run: dotnet build Atlas.SecurityPlatform.slnx --configuration Release --no-restore

      - name: Run backend unit tests
        run: |
          dotnet test tests/Atlas.WorkflowCore.Tests --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory artifacts/coverage/workflow
          dotnet test tests/Atlas.SecurityPlatform.Tests --configuration Release --no-build --filter "FullyQualifiedName!~Integration" --collect:"XPlat Code Coverage" --results-directory artifacts/coverage/security

      - name: Coverage gate (backend >= 60%)
        run: |
          python3 - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          files = glob.glob("artifacts/coverage/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("未找到 coverage.cobertura.xml，阻断构建。")
              sys.exit(1)

          covered = 0
          valid = 0
          for file in files:
              root = ET.parse(file).getroot()
              covered += int(root.attrib.get("lines-covered", "0"))
              valid += int(root.attrib.get("lines-valid", "0"))

          rate = (covered / valid) if valid else 0.0
          print(f"Backend line coverage: {rate:.2%} ({covered}/{valid})")
          if rate < 0.60:
              print("覆盖率未达到门禁阈值 60%。")
              sys.exit(1)
          PY

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/Atlas.WebApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/Atlas.WebApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  integration:
    name: integration (api + e2e)
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
    env:
      ASPNETCORE_ENVIRONMENT: Development
      CI: true
      API_BASE_URL: http://127.0.0.1:5000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
      PLAYWRIGHT_PORT: 5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/Atlas.WebApp/package-lock.json

      - name: Restore backend
        run: dotnet restore Atlas.SecurityPlatform.slnx

      - name: Build backend
        run: dotnet build Atlas.SecurityPlatform.slnx --configuration Release --no-restore

      - name: Install frontend dependencies
        working-directory: src/frontend/Atlas.WebApp
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: src/frontend/Atlas.WebApp
        run: npx playwright install --with-deps chromium

      - name: Start backend service
        run: |
          nohup dotnet run --project src/backend/Atlas.WebApi --urls http://127.0.0.1:5000 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..90}; do
            if curl -fsS "$API_BASE_URL/api/v1/health" >/tmp/health.json; then
              echo "Health endpoint is ready."
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "Health endpoint not ready in time." >&2
          tail -n 200 backend.log || true
          exit 1

      - name: Verify OpenAPI generated types are up to date
        run: |
          "$HOME/.dotnet/tools/nswag" run src/backend/Atlas.WebApi/nswag.json
          git diff --exit-code src/frontend/Atlas.WebApp/src/types/api-generated.ts

      - name: Run API integration suite
        id: api-suite
        run: |
          python3 .github/scripts/run_http_suite.py \
            --base-url "$API_BASE_URL" \
            --summary-file artifacts/api-suite-summary.json \
            --log-file artifacts/api-suite-log.json \
            --failed-file artifacts/api-suite-failures.json

      - name: Append API summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary_file = Path("artifacts/api-suite-summary.json")
          if summary_file.exists():
              summary = json.loads(summary_file.read_text(encoding="utf-8"))
              lines = [
                  "## API 集成测试摘要",
                  "",
                  f"- 接口总数: {summary.get('total', 0)}",
                  f"- 通过数: {summary.get('passed', 0)}",
                  f"- 失败数: {summary.get('failed', 0)}",
                  f"- 跳过数: {summary.get('skipped', 0)}",
              ]
          else:
              lines = ["## API 集成测试摘要", "", "- 未生成摘要文件"]

          with open(Path(__import__('os').environ['GITHUB_STEP_SUMMARY']), 'a', encoding='utf-8') as fp:
              fp.write("\n".join(lines) + "\n")

          print("\n".join(lines))
          PY

      - name: Run frontend e2e against real backend
        working-directory: src/frontend/Atlas.WebApp
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_PORT: 5173
        run: npm run e2e

      - name: Stop backend service
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi

      - name: Upload integration artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-artifacts
          path: |
            backend.log
            artifacts/api-suite-summary.json
            artifacts/api-suite-log.json
            artifacts/api-suite-failures.json
            src/frontend/Atlas.WebApp/test-results
          if-no-files-found: warn
