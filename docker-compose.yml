name: atlas

services:
  backend:
    image: atlas/backend:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: src/backend/Atlas.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      TZ: Asia/Shanghai
      Security__EnforceHttps: "false"
      Database__ConnectionString: Data Source=/data/atlas.db
      FileStorage__BasePath: /data/uploads
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:-http://localhost}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Security__BootstrapAdmin__Password: ${BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      - /opt/atlas/data:/data
      - /opt/atlas/logs/backend:/app/logs
      - /opt/atlas/plugins:/app/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    networks:
      - atlas-net

  frontend:
    image: atlas/frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: src/frontend/Atlas.WebApp/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - atlas-net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/atlas/logs/nginx:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - atlas-net

networks:
  atlas-net:
    driver: bridge
